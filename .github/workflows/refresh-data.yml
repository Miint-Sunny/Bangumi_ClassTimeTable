name: refresh-data

on:
  schedule:
    - cron: '20 22 * * *' # 每日 22:20 UTC ≈ 北京 06:20,新番深夜档播完后
  workflow_dispatch:
    inputs:
      backfill:
        description: '回填整季(而非增量窗口)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: 拉取 bangumi-data 数据集(jsDelivr CDN)
        run: |
          python3 -c "import sys; sys.path.insert(0,'scripts'); from bgm_dataset import fetch_dataset; fetch_dataset()"

      - name: 同步 bgm.wiki 每集精确时刻
        env:
          BGM_WIKI_TOKEN: ${{ secrets.BGM_WIKI_TOKEN }}
        run: |
          if [ -z "$BGM_WIKI_TOKEN" ]; then
            echo "::warning::缺 BGM_WIKI_TOKEN secret,跳过同步"
            exit 0
          fi
          python3 scripts/bgmwiki_sync.py ${{ inputs.backfill && '--backfill' || '' }} | tee sync.log

      - name: 产地标注(识别放送表里的国创/欧美条目)
        run: python3 scripts/mark_region.py

      - name: 校验产物
        run: |
          python3 - <<'EOF'
          import json, sys
          d = json.load(open('public/data/enhance.json'))
          n = len(d.get('entries') or {})
          assert n >= 50, f'entries 数量异常: {n}'
          air_manual = sum(1 for e in d['entries'].values()
                           if any(k in (e.get('air') or {}) for k in ('advanceEps','anchorEp')))
          print(f'entries={n}, 人工 air 校正={air_manual} (应 >= 3)')
          assert air_manual >= 3, '人工校正疑似被覆盖!'
          EOF

      # 校验已把关(条目数量 + 人工校正保留),直接进 main。
      # 曾经的开 PR 流程没人每天点合并,数据积压在分支上永远到不了站点。
      - name: 提交数据到 main
        id: commit
        run: |
          if git diff --quiet public/data/enhance.json; then
            echo "数据无变化,跳过提交"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/enhance.json
          git commit -m "data: bgm.wiki 每日同步"
          git pull --rebase origin main
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      # GITHUB_TOKEN 的推送不会触发 on:push 的 deploy-cloudflare,
      # 所以数据变更后在这里自己部署;缺 secret 时警告跳过(等用户手动 deploy 捎带)。
      - uses: actions/setup-node@v6
        if: steps.commit.outputs.changed == 'true'
        with:
          node-version: 22
          cache: npm
      - name: 部署到 Cloudflare Workers(缺 secret 跳过)
        if: steps.commit.outputs.changed == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::warning::缺 CLOUDFLARE_API_TOKEN:数据已进 main,但站点要等下次手动 npm run deploy 才更新"
            exit 0
          fi
          npm ci
          npm run build
          npx wrangler deploy
