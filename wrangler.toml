# Cloudflare Workers 一体化部署:静态站点(dist/)+ bgm.tv OAuth 令牌代理(worker/worker.js)
# 同一个域名下,静态资源直出,/oauth/* 落到 Worker —— 同源,无需 CORS。
# 部署步骤见 worker/README.md;本地:npm run deploy
name = "bangumi-timetable"
main = "worker/worker.js"
compatibility_date = "2026-01-01"

# 正式域名(Cloudflare Registrar 购入,zone 已在账号内):deploy 时自动创建绑定与 DNS。
# 若域名还没进这个 Cloudflare 账号,先在仪表盘 Add site 接管;绑定报错时可临时
# 注释掉下面两行 + 把 workers_dev 改回 true,先用 workers.dev 预览地址。
routes = [
  { pattern = "bgmtimetable.com", custom_domain = true }
]
# 正式域名作为唯一入口,不开 workers.dev 地址(避免同一站点两个 origin)
workers_dev = false

[assets]
directory = "./dist"

[vars]
# 额外允许调用 /oauth/* 的前端来源(同源请求始终放行,通常留空即可)
ALLOWED_ORIGINS = ""

# 机密不写在这里,用 wrangler secret 注入:
#   npx wrangler secret put BGM_CLIENT_ID
#   npx wrangler secret put BGM_CLIENT_SECRET
