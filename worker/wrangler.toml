# Cloudflare Worker 配置:bgm.tv OAuth 令牌代理
# 部署步骤见同目录 README.md
name = "bgm-oauth-proxy"
main = "worker.js"
compatibility_date = "2026-01-01"

[vars]
# 允许调用本代理的前端来源(Origin,不带路径),逗号分隔。
# localhost 供本地开发调试,不需要可删。
ALLOWED_ORIGINS = "https://miint-sunny.github.io,http://localhost:5173"

# 机密不写在这里,用 wrangler secret 注入:
#   npx wrangler secret put BGM_CLIENT_ID
#   npx wrangler secret put BGM_CLIENT_SECRET
