<!doctype html>
<html lang="zh-Hans" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="referrer" content="no-referrer" />
  <title>番组课表 · bangumi timetable</title>
  <script>
    // 早期应用主题,避免首屏闪烁
    (function () {
      try {
        var s = localStorage.getItem('btt:v1');
        if (s) {
          var theme = JSON.parse(s).settings?.theme;
          if (theme === 'light' || theme === 'dark' || theme === 'contrast')
            document.documentElement.setAttribute('data-theme', theme);
        }
      } catch (_) {}
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
